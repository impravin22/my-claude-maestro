name: Track Upstream Dependencies

on:
  schedule:
    # Runs daily at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      updates_found: ${{ steps.check.outputs.updates_found }}
      change_summary: ${{ steps.check.outputs.change_summary }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check upstream repos for updates
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          STATE_FILE=".github/upstream-state.json"
          UPDATES_FOUND=false
          ISSUE_BODY=""

          # Define upstream repos to track
          declare -A REPOS
          REPOS[superpowers]="obra/superpowers"
          REPOS[context7]="upstash/context7"
          REPOS[vercel-agent-skills]="vercel-labs/agent-skills"
          REPOS[playwright-mcp]="microsoft/playwright-mcp"
          REPOS[claude-mem]="thedotmack/claude-mem"
          REPOS[ui-ux-pro-max]="nextlevelbuilder/ui-ux-pro-max-skill"
          REPOS[n8n-mcp]="czlonkowski/n8n-mcp"
          REPOS[voicemode]="mbailey/voicemode"
          REPOS[everything-claude-code]="affaan-m/everything-claude-code"
          REPOS[lightrag]="HKUDS/LightRAG"
          REPOS[karpathy-skills]="forrestchang/andrej-karpathy-skills"
          REPOS[caveman]="JuliusBrussee/caveman"

          # Load previous state (or create empty)
          if [ -f "$STATE_FILE" ]; then
            PREV_STATE=$(cat "$STATE_FILE")
          else
            PREV_STATE='{}'
          fi

          # Helper: fetch GitHub API and strip control chars that break jq.
          # Preserves newlines (\012) and tabs (\011) needed for valid JSON.
          safe_api() {
            local response
            response=$(gh api "$1" 2>/dev/null) || { echo "$2"; return; }
            printf '%s' "$response" | tr -d '\000-\010\013-\014\016-\037'
          }

          NEW_STATE='{'
          FIRST=true

          for KEY in "${!REPOS[@]}"; do
            REPO="${REPOS[$KEY]}"
            echo "Checking $REPO..."

            # Get latest release tag (handle 404 for repos with no releases)
            LATEST_RELEASE=$(safe_api "repos/$REPO/releases/latest" '{"tag_name":"none"}' | jq -r '.tag_name // "none"' 2>/dev/null || echo "none")

            # Get latest commit on default branch (single fetch)
            RAW_COMMITS_1=$(safe_api "repos/$REPO/commits?per_page=1" '[]')
            LATEST_COMMIT=$(echo "$RAW_COMMITS_1" | jq -r '.[0].sha // "unknown"' 2>/dev/null || echo "unknown")
            LATEST_COMMIT_MSG=$(echo "$RAW_COMMITS_1" | jq -r '.[0].commit.message // ""' 2>/dev/null | head -1 || echo "")
            LATEST_COMMIT_DATE=$(echo "$RAW_COMMITS_1" | jq -r '.[0].commit.committer.date // ""' 2>/dev/null || echo "")

            # Get previous state for this repo
            PREV_RELEASE=$(echo "$PREV_STATE" | jq -r ".\"$KEY\".release // \"\"")
            PREV_COMMIT=$(echo "$PREV_STATE" | jq -r ".\"$KEY\".commit // \"\"")

            # Check for changes
            CHANGED=false
            CHANGE_DETAILS=""

            if [ "$LATEST_RELEASE" != "none" ] && [ "$LATEST_RELEASE" != "$PREV_RELEASE" ] && [ -n "$PREV_RELEASE" ]; then
              CHANGED=true
              CHANGE_DETAILS="${CHANGE_DETAILS}"$'\n'"  - **New release:** \`$LATEST_RELEASE\` (was \`$PREV_RELEASE\`)"

              # Get release notes
              RELEASE_BODY=$(safe_api "repos/$REPO/releases/latest" '{}' | jq -r '.body // ""' 2>/dev/null | head -20 || echo "")
              if [ -n "$RELEASE_BODY" ]; then
                CHANGE_DETAILS="${CHANGE_DETAILS}"$'\n'"  - Release notes:"$'\n'"\`\`\`"$'\n'"${RELEASE_BODY}"$'\n'"\`\`\`"
              fi
            fi

            if [ "$LATEST_COMMIT" != "$PREV_COMMIT" ] && [ -n "$PREV_COMMIT" ]; then
              CHANGED=true

              # Count commits since last check
              COMMIT_COUNT=$(safe_api "repos/$REPO/compare/$PREV_COMMIT...$LATEST_COMMIT" '{}' | jq -r '.total_commits // "?"' 2>/dev/null || echo "?")
              CHANGE_DETAILS="${CHANGE_DETAILS}"$'\n'"  - **$COMMIT_COUNT new commit(s)** since last check"
              CHANGE_DETAILS="${CHANGE_DETAILS}"$'\n'"  - Latest: \`${LATEST_COMMIT:0:7}\` — $LATEST_COMMIT_MSG"

              # Get recent commit summaries (up to 5)
              RAW_COMMITS_5=$(safe_api "repos/$REPO/commits?per_page=5" '[]')
              RECENT_COMMITS=$(echo "$RAW_COMMITS_5" | jq -r '[.[] | "  - `\(.sha[0:7])` \(.commit.message | split("\n")[0])"] | join("\n")' 2>/dev/null || echo "")
              if [ -n "$RECENT_COMMITS" ]; then
                CHANGE_DETAILS="${CHANGE_DETAILS}"$'\n'"  - Recent commits:"$'\n'"${RECENT_COMMITS}"
              fi
            fi

            if [ "$CHANGED" = true ]; then
              UPDATES_FOUND=true
              ISSUE_BODY="${ISSUE_BODY}"$'\n'"### [$KEY](https://github.com/$REPO)"$'\n'"${CHANGE_DETAILS}"$'\n'
            fi

            # Build new state JSON
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              NEW_STATE="$NEW_STATE,"
            fi
            NEW_STATE="$NEW_STATE\"$KEY\":{\"release\":\"$LATEST_RELEASE\",\"commit\":\"$LATEST_COMMIT\"}"
          done

          NEW_STATE="$NEW_STATE}"

          # Save new state
          echo "$NEW_STATE" | jq '.' > "$STATE_FILE"

          # Create issue if updates found
          if [ "$UPDATES_FOUND" = true ]; then
            TITLE="Upstream updates detected — $(date +%Y-%m-%d)"
            BODY=$(printf '%s\n' \
              '## Upstream Dependency Updates' \
              '' \
              'The following upstream repos have new changes that may affect Maestro:' \
              "$ISSUE_BODY" \
              '---' \
              '' \
              '### Action Required' \
              '' \
              'Review these changes and determine if Maestro needs updating:' \
              '' \
              '- [ ] Check if new superpowers skills should be orchestrated' \
              '- [ ] Check if Context7 API has changed' \
              '- [ ] Check if new Vercel agent skills are available' \
              '- [ ] Check if Playwright MCP API or capabilities have changed' \
              '- [ ] Check if claude-mem MCP tool names or hook schema have changed' \
              '- [ ] Check if UI UX Pro Max, n8n-MCP, VoiceMode, Everything Claude Code, LightRAG, Karpathy Skills, or Caveman have breaking changes' \
              '- [ ] Update SKILL.md if needed' \
              '- [ ] Update checklists if needed' \
              '- [ ] Bump version in plugin.json if changes made' \
              '' \
              '*This issue was automatically created by the upstream tracker workflow.*')

            # Check for existing open issue to avoid duplicates
            EXISTING=$(gh issue list --repo "${{ github.repository }}" --label "upstream-update" --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null || echo "")

            if [ -n "$EXISTING" ]; then
              # Comment on existing issue
              gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "$BODY"
              echo "Updated existing issue #$EXISTING"
            else
              # Create new issue
              gh issue create \
                --repo "${{ github.repository }}" \
                --title "$TITLE" \
                --body "$BODY" \
                --label "upstream-update"
              echo "Created new upstream update issue"
            fi
          else
            echo "No upstream changes detected"
          fi

          # Set outputs for downstream jobs
          echo "updates_found=$UPDATES_FOUND" >> "$GITHUB_OUTPUT"
          if [ "$UPDATES_FOUND" = true ]; then
            # Use a random delimiter to prevent content collision
            DELIM="EOF_$(date +%s%N | sha256sum | head -c 16)"
            {
              echo "change_summary<<$DELIM"
              printf '%s\n' "$ISSUE_BODY"
              echo "$DELIM"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Upload computed state
        uses: actions/upload-artifact@v4
        with:
          name: upstream-state
          path: .github/upstream-state.json
          retention-days: 1

  create-pr:
    needs: check-upstream
    if: needs.check-upstream.outputs.updates_found == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for existing upstream sync PR
        id: existing-pr
        run: |
          EXISTING_PR=$(gh pr list --repo "$GITHUB_REPOSITORY" --label "upstream-update" --state open --limit 1 --json number --jq '.[0].number' 2>/dev/null || echo "")
          echo "pr_number=$EXISTING_PR" >> "$GITHUB_OUTPUT"

      - name: Download computed state
        if: steps.existing-pr.outputs.pr_number == ''
        uses: actions/download-artifact@v4
        with:
          name: upstream-state
          path: .github/

      - name: Create sync branch with state + marker
        if: steps.existing-pr.outputs.pr_number == ''
        run: |
          BRANCH="chore/upstream-sync-$(date +%Y-%m-%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          # State file already replaced by download-artifact step; add sync marker
          jq --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" '. + {last_sync: $ts}' \
            .github/upstream-state.json > .github/upstream-state.tmp \
            && mv .github/upstream-state.tmp .github/upstream-state.json
          git add .github/upstream-state.json
          git commit -m "chore: upstream sync $(date +%Y-%m-%d)"

          git push -u origin "$BRANCH"
          echo "SYNC_BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Create PR
        if: steps.existing-pr.outputs.pr_number == ''
        env:
          CHANGE_SUMMARY: ${{ needs.check-upstream.outputs.change_summary }}
        run: |
          PR_BODY="## Upstream Dependency Sync

          Upstream changes detected by the daily tracker workflow.

          ### Changes Detected

          ${CHANGE_SUMMARY}

          ---

          ### Review Checklist

          - [ ] Check for breaking API changes in updated dependencies
          - [ ] Update SKILL.md if upstream capabilities changed
          - [ ] Update install.sh if install methods changed
          - [ ] Update checklists if needed
          - [ ] Bump version in plugin.json if changes made
          - [ ] Run \`install.sh --dry-run\` to verify

          *This PR was automatically created by the upstream tracker workflow.*"

          gh pr create \
            --head "$SYNC_BRANCH" \
            --title "chore: upstream dependency sync $(date +%Y-%m-%d)" \
            --body "$PR_BODY" \
            --label "upstream-update"

      - name: Comment on existing PR
        if: steps.existing-pr.outputs.pr_number != ''
        env:
          CHANGE_SUMMARY: ${{ needs.check-upstream.outputs.change_summary }}
          PR_NUMBER: ${{ steps.existing-pr.outputs.pr_number }}
        run: |
          COMMENT_BODY="## New upstream changes detected ($(date +%Y-%m-%d))

          ${CHANGE_SUMMARY}

          *Updated by the upstream tracker workflow.*"

          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "$COMMENT_BODY"
